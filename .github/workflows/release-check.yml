name: Release check

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build release candidate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Test backend
        working-directory: intern-diary-server
        run: |
          pip install -e .[test]
          pytest -q

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Android debug APK
        working-directory: intern-diary-android
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: intern-diary-debug-apk
          path: intern-diary-android/app/build/outputs/apk/debug/app-debug.apk
