services:
  intern-diary-api:
    image: intern-diary:local
    container_name: intern-diary-api
    restart: unless-stopped
    mem_limit: 256m
    env_file:
      - ./.env
    environment:
      DATA_DIR: /data
      TEMPLATE_PATH: /data/templates/diary_template_working.docx
    volumes:
      - ./data:/data
    ports:
      - "127.0.0.1:8088:8088"
